  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title></title>

    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --preloader-bg: #f0e4e4;
      }

      :root[theme="dark"] {
        --preloader-bg: #35363C;
      }

      #preloader {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;

        width: 100vw;
        height: 100vh;
        z-index: 99999;
        position: fixed;
        transition: .5s;
        background-color: var(--preloader-bg);

        .preloader-animation {
          animation-duration: 1s;
          animation-name: preloader-anim;
          animation-iteration-count: infinite;
          svg {
            height: 100px;  
          }
        }

        .preloader-shadow {
          animation-duration: 1s;
          animation-name: preloader-shadow-anim;
          animation-iteration-count: infinite;
          svg {
            height: 14px;
            transform: perspective(100px) translateZ(0px);
          }
        }
      }

      #preloader.invisible {
        visibility: hidden;
        opacity: 0;
      }

      @keyframes preloader-anim {
        0% {
          transform: translateY(0px);
        } 50% {
          transform: translateY(-10px);
        } 100% {
          transform: translateY(0px);
        }
      }

      @keyframes preloader-shadow-anim {
        0% {
          opacity: .75;
          transform: perspective(100px) translateZ(0px);
        } 50% {
          opacity: .5;
          transform: perspective(100px) translateZ(-50px);
        } 100% {
          opacity: .75;
          transform: perspective(100px) translateZ(0px);
        }
      }
    </style>
    <script type="module" crossorigin src="assets/index-DYgqnXmJ.js"></script>

  </head>
  <body>
    <div id="preloader">
      <div class="preloader-animation">

        </svg>
      </div>

      <div class="preloader-shadow">
        <svg viewBox="0 0 8 3" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse opacity="0.3" cx="4" cy="1.5" rx="4" ry="1.5" fill="#000000"/>
        </svg>
      </div>
    </div>
    
    <div id="root"></div>

    <script>
      if (localStorage.getItem("theme")) {
        document.documentElement.setAttribute("theme", 
          localStorage.getItem("theme") === "dark" ? "dark" : "light");
      } else localStorage.setItem("theme", "light");

      window.onload = function () {
        document.getElementById("preloader").classList.add("invisible");
      };
    </script>
